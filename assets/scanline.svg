<svg width="1000" height="20" viewBox="0 0 1000 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes scan {
      0% { transform: translateX(-100%) }
      100% { transform: translateX(100%) }
    }
    .line { fill: url(#grad); animation: scan 4s linear infinite; }
  </style>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00ffbc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect x="0" y="8" width="400" height="3" class="line" filter="blur(1px)" />
</svg>
